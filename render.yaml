services:
  - type: web
    name: ubica-backend
    runtime: python
    buildCommand: pip install -r ubica-backend/requirements.txt
    startCommand: cd ubica-backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11
